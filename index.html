<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almeidadev — Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3rem 1rem 2.5rem;
      font-family: 'Sora', sans-serif;
      position: relative;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: url('f283e007167a851a87180954a0a02c9f.jpg');
      background-size: cover;
      background-position: center;
      filter: blur(10px) brightness(0.3);
      transform: scale(1.08);
      z-index: -1;
    }

    .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: #151515;
      border: 1.5px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 600; color: rgba(255,255,255,0.85);
      margin-bottom: 14px;
    }

    .name {
      font-size: 20px; font-weight: 600;
      color: rgba(255,255,255,0.92);
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .handle {
      font-size: 13px; color: rgba(255,255,255,0.32);
      margin-bottom: 2.2rem;
      letter-spacing: 0.3px;
    }

    .links {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .banner {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 22px;
      width: 100%;
      height: 90px;
      border-radius: 14px;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: transform 0.16s ease, filter 0.16s ease;
      backdrop-filter: blur(12px);
    }
    .banner:hover { transform: translateY(-2px); filter: brightness(1.12); }
    .banner:active { transform: scale(0.98); }

    .banner-icon {
      font-size: 36px;
      flex-shrink: 0;
    }

    .banner-text { flex: 1; }

    .banner-title {
      font-size: 13px; font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      margin-bottom: 4px;
    }

    .banner-sub {
      font-size: 11.5px; font-weight: 400;
      letter-spacing: 0.2px;
      line-height: 1.4;
      opacity: 0.75;
    }

    .banner-arrow {
      font-size: 18px; opacity: 0.4; flex-shrink: 0;
    }

    .yt {
      background: url('YT.png') center/cover no-repeat;
      border: 1px solid #000000;
    }
    .yt .banner-icon, .yt .banner-title, .yt .banner-arrow { color: #ff4444; }
    .yt .banner-sub { color: #ffbbbb; }

    .ig {
      background: url('IS.png') center/cover no-repeat;
      border: 1px solid #000000;
    }
    .ig .banner-icon, .ig .banner-title, .ig .banner-arrow { color: #e060b0; }
    .ig .banner-sub { color: #f0bbdd; }

    .tt {
      background: url('TK.png') center/cover no-repeat;
      border: 1px solid #000000;
    }
    .tt .banner-icon, .tt .banner-title, .tt .banner-arrow { color: #69c9d0; }
    .tt .banner-sub { color: #aae8ee; }

    .li {
      background: url('LK.png') center/cover no-repeat;
      border: 1px solid #000000;
    }
    .li .banner-icon, .li .banner-title, .li .banner-arrow { color: #4da8e0; }
    .li .banner-sub { color: #99ccee; }

    .avatar {
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.08);
    }

    .footer {
      margin-top: 2.5rem;
      font-size: 11px;
      color: rgba(255,255,255,0.16);
      letter-spacing: 0.5px;
    }

    /* SVG icons inline */
    .icon { width: 36px; height: 36px; display: block; }
  </style>
</head>
<body>

  <div class="bg"></div>

  <img class="avatar" src="fotonew.jpeg" style="object-fit:cover;" />
  <div class="name">Almeidadev</div>
  <div class="handle">@alealmeidajrr</div>

  <div class="links">
