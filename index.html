<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almeidadev — Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3rem 1rem 2.5rem;
      font-family: 'Sora', sans-serif;
    }

    .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: #151515;
      border: 1.5px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 600; color: rgba(255,255,255,0.85);
      margin-bottom: 14px;
    }

    .name {
      font-size: 20px; font-weight: 600;
      color: rgba(255,255,255,0.92);
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .handle {
      font-size: 13px; color: rgba(255,255,255,0.32);
      margin-bottom: 2.2rem;
      letter-spacing: 0.3px;
    }

    .links {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .banner {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 22px;
      width: 100%;
      height: 90px;
      border-radius: 14px;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: transform 0.16s ease, filter 0.16s ease;
    }
    .banner:hover { transform: translateY(-2px); filter: brightness(1.12); }
    .banner:active { transform: scale(0.98); }

    .banner-icon {
      font-size: 36px;
      flex-shrink: 0;
    }

    .banner-text { flex: 1; }

    .banner-title {
      font-size: 13px; font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      margin-bottom: 4px;
    }

    .banner-sub {
      font-size: 11.5px; font-weight: 400;
      letter-spacing: 0.2px;
      line-height: 1.4;
      opacity: 0.75;
    }

    .banner-arrow {
      font-size: 18px; opacity: 0.4; flex-shrink: 0;
    }

    /* YouTube */
    .yt {
      background: linear-gradient(110deg, #1a0000 0%, #3a0000 60%, #1a0000 100%);
      border: 1px solid rgba(255,60,60,0.2);
    }
    .yt .banner-icon, .yt .banner-title, .yt .banner-arrow { color: #ff4444; }
    .yt .banner-sub { color: #ffbbbb; }

    /* Instagram */
    .ig {
      background: linear-gradient(110deg, #1a0010 0%, #380022 60%, #1a0010 100%);
      border: 1px solid rgba(210,60,140,0.2);
    }
    .ig .banner-icon, .ig .banner-title, .ig .banner-arrow { color: #e060b0; }
    .ig .banner-sub { color: #f0bbdd; }

    /* TikTok */
    .tt {
      background: linear-gradient(110deg, #000d18 0%, #001828 60%, #000d18 100%);
      border: 1px solid rgba(100,200,220,0.18);
    }
    .tt .banner-icon, .tt .banner-title, .tt .banner-arrow { color: #69c9d0; }
    .tt .banner-sub { color: #aae8ee; }

    /* LinkedIn */
    .li {
      background: linear-gradient(110deg, #000a18 0%, #001428 60%, #000a18 100%);
      border: 1px solid rgba(50,130,210,0.2);
    }
    .li .banner-icon, .li .banner-title, .li .banner-arrow { color: #4da8e0; }
    .li .banner-sub { color: #99ccee; }

    .footer {
      margin-top: 2.5rem;
      font-size: 11px;
      color: rgba(255,255,255,0.16);
      letter-spacing: 0.5px;
    }

    /* SVG icons inline */
    .icon { width: 36px; height: 36px; display: block; }
  </style>
</head>
